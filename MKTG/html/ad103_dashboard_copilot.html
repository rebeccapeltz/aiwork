  const EVENT_ORDER = ["Impression", "Click", "Like", "Comment", "Share", "Purchase"];
  const DAY_ORDER = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
  const TIME_ORDER = ["Morning", "Afternoon", "Evening", "Night"];
  const COLORS = {"Impression": "#4C78A8", "Click": "#F58518", "Like": "#54A24B", "Comment": "#B279A2", "Share": "#E45756", "Purchase": "#72B7B2"};

  function pivot(values, indexKey, columnKey, valueKey, indexOrder, colOrder) {
    // Build a 2D matrix for heatmap or bars
    const idxMap = new Map(indexOrder.map((v,i)=>[v,i]));
    const colMap = new Map(colOrder.map((v,i)=>[v,i]));
    const mat = Array.from({length: indexOrder.length}, ()=>Array(colOrder.length).fill(0));
    for (let i=0;i<values[indexKey].length;i++) {
      const r = values[indexKey][i];
      const c = values[columnKey][i];
      const val = values[valueKey][i];
      if (idxMap.has(r) && colMap.has(c)) {
        mat[idxMap.get(r)][colMap.get(c)] += val;
      }
    }
    return mat;
  }

  function updateAll() {
    const d = document.getElementById('dayFilter').value;
    const t = document.getElementById('timeFilter').value;
    const key = `${d}|${t}`;
    const data = COMBO[key];

    // KPI
    const kpiFig = document.getElementById('kpiFig');
    const k = data.kpis;
    const ann = [
      `Total Impressions: <b>${k.total_impressions.toLocaleString()}</b>`,
      `Click-through Rate: <b>${k.ctr_pct.toFixed(2)}%</b>`,
      `Conversion Rate (Purchases/Impressions): <b>${k.conversion_pct.toFixed(2)}%</b>`,
      `Unique Users Reached: <b>${k.unique_users_reached.toLocaleString()}</b>`
    ];
    const kpiUpdate = { 'annotations[0].text': ann[0], 'annotations[1].text': ann[1], 'annotations[2].text': ann[2], 'annotations[3].text': ann[3] };
    Plotly.relayout(kpiFig, kpiUpdate);

    // Funnel
    const funnelFig = document.getElementById('funnelFig');
    const x = EVENT_ORDER.map(e => data.funnel_counts[e] || 0);
    Plotly.restyle(funnelFig, { x: [x] });

    // By Day (stacked)
    const dayFig = document.getElementById('dayFig');
    const byDay = data.by_day;
    // Build pivot table day x event_type
    const matDay = pivot(byDay, 'day_of_week', 'event_type', 'count', DAY_ORDER, EVENT_ORDER);
    // Update traces per event
    for (let j=0;j<EVENT_ORDER.length;j++) {
      const y = DAY_ORDER.map((_,i)=>matDay[i][j]||0);
      Plotly.restyle(dayFig, { y: [y] }, [j]);
    }

    // By Time (grouped)
    const timeFig = document.getElementById('timeFig');
    const byTime = data.by_time;
    const matTime = pivot(byTime, 'time_of_day', 'event_type', 'count', TIME_ORDER, EVENT_ORDER);
    for (let j=0;j<EVENT_ORDER.length;j++) {
      const y = TIME_ORDER.map((_,i)=>matTime[i][j]||0);
      Plotly.restyle(timeFig, { y: [y] }, [j]);
    }

    // Heatmap
    const heatFig = document.getElementById('heatFig');
    const heat = data.heat;
    const mat = pivot(heat, 'day_of_week', 'time_of_day', 'count', DAY_ORDER, TIME_ORDER);
    Plotly.restyle(heatFig, { z: [mat] });
  }

  document.getElementById('dayFilter').addEventListener('change', updateAll);
  document.getElementById('timeFilter').addEventListener('change', updateAll);

  // Initial call
  updateAll();
